<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitar Chamada — ASARAX</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="header">
    <div class="logo">ASARAX</div>
  </header>

  <section class="section">
    <h2>Solicitar uma Chamada Estratégica</h2>

    <p style="max-width:600px;margin-bottom:40px;">
      Este formulário nos ajuda a entender seu negócio e avaliar se a ASARAX
      é a solução certa para o seu momento de crescimento.
    </p>

    <form
      class="asarax-form"
      id="applyForm"
      action="https://script.google.com/macros/s/AKfycbye2FA6gVzEsQKj_Jejv7YBBNjl0eqcX1uDG61l5vY3VFh6Dg-8TPKNW_DNnC2pvSoaYQ/exec"
      method="POST"
      target="hidden_iframe"
    >
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="name" required />
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" required />
      </div>

      <div class="form-group">
        <label>WhatsApp</label>
        <input type="tel" name="phone" required />
      </div>

      <div class="form-group">
        <label>Nome da empresa</label>
        <input type="text" name="company" />
      </div>

      <button type="submit" class="btn primary">
        Enviar solicitação
      </button>

      <p style="opacity:.5;font-size:.75rem;margin-top:20px;">
        Todas as solicitações são analisadas manualmente.
      </p>
    </form>

    <!-- iframe invisível: envia pro Google sem sair da página -->
    <iframe name="hidden_iframe" style="display:none;"></iframe>
  </section>

  <script src="js/apply.js"></script>
</body>
</html>
